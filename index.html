<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>Balloon Invasion</title>

    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <meta name="apple-mobile-web-app-title" content="Balloon Invasion">
    
    <link rel="apple-touch-icon" href="icon.png">

    <style>
        * {
            -webkit-tap-highlight-color: transparent;
            box-sizing: border-box;
        }
        body, html { 
            margin: 0; 
            padding: 0; 
            height: 100%; 
            width: 100%; 
            overflow: hidden; 
            background-color: #000;
            display: flex;
            flex-direction: column; /* Stacks player on top of the credit */
        }
        #player-container { 
            flex-grow: 1; /* Takes up all available space except for the footer */
            width: 100vw; 
            display: flex; 
            align-items: center; 
            justify-content: center; 
        }
        ruffle-player {
            width: 100%;
            height: 100%;
        }
        /* Modern Footer Design */
        .footer {
            height: 40px;
            background: rgba(255, 255, 255, 0.05);
            backdrop-filter: blur(10px);
            border-top: 1px solid rgba(255, 255, 255, 0.1);
            display: flex;
            align-items: center;
            justify-content: center;
            padding-bottom: env(safe-area-inset-bottom); /* Fix for iPhone Notch/Home Bar */
        }
        .footer p {
            color: rgba(255, 255, 255, 0.6);
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
            font-size: 13px;
            letter-spacing: 0.5px;
            margin: 0;
        }
        .footer b {
            color: #fff;
            margin-left: 4px;
        }
    </style>
</head>
<body>

    <div id="player-container"></div>

    <div class="footer">
        <p>Developed By : <b>Didar Baxtear</b></p>
    </div>

    <script src="https://unpkg.com/@ruffle-rs/ruffle"></script>

    <script>
        window.RufflePlayer = window.RufflePlayer || {};
        window.addEventListener("DOMContentLoaded", () => {
            const ruffle = window.RufflePlayer.newest();
            const player = ruffle.createPlayer();
            const container = document.getElementById("player-container");
            
            container.appendChild(player);

            player.config = {
                letterbox: "on",
                autoPlay: "on",
                unmuteOverlay: "visible",
            };

            player.load({
                url: "game.swf",
                allowScriptAccess: true,
            });
        });
    </script>
</body>
</html>
